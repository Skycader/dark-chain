<html lang="en">
  <head>
    <meta charset="UTF-8" />

    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap");

      :root {
        --c: #00f5ff;
        --p: #ff0080;
        --g: #00ff41;
        --y: #ffea00;
        --bg: #020208;
        --bg2: #06060f;
        --panel: #08081a;
        --border: #181830;
        --text: #9090b8;
        --dim: #6060a0;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Share Tech Mono", "Courier New", monospace;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.13) 2px,
          rgba(0, 0, 0, 0.13) 4px
        );
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9998;
        background: radial-gradient(
          ellipse at center,
          transparent 50%,
          rgba(0, 0, 0, 0.65) 100%
        );
      }

      /* ─── HEADER ──────────────────────────────────── */
      header {
        background: var(--bg2);
        border-bottom: 1px solid rgba(0, 245, 255, 0.2);
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
        position: relative;
        z-index: 10;
      }
      .logo {
        font-family: "Orbitron", sans-serif;
        font-size: 13px;
        font-weight: 900;
        color: var(--c);
        text-shadow:
          0 0 12px var(--c),
          0 0 28px rgba(0, 245, 255, 0.3);
        letter-spacing: 4px;
        white-space: nowrap;
        position: relative;
      }
      .logo::before {
        content: attr(data-t);
        position: absolute;
        inset: 0;
        color: var(--p);
        opacity: 0;
        animation: glitch 7s infinite;
        clip-path: polygon(0 20%, 100% 20%, 100% 42%, 0 42%);
      }
      @keyframes glitch {
        0%,
        87%,
        100% {
          opacity: 0;
          transform: translateX(0);
        }
        89% {
          opacity: 0.6;
          transform: translateX(-3px);
        }
        91% {
          opacity: 0.4;
          transform: translateX(4px);
        }
        93% {
          opacity: 0;
        }
      }
      .fg {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .fl {
        font-size: 8px;
        letter-spacing: 2px;
        color: var(--dim);
        text-transform: uppercase;
      }
      .ci {
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--c);
        color: var(--c);
        font-family: "Orbitron", sans-serif;
        font-size: 14px;
        font-weight: 700;
        outline: none;
        padding: 1px 4px;
        text-shadow: 0 0 8px var(--c);
        width: 100px;
        letter-spacing: 3px;
        text-transform: uppercase;
        transition: all 0.2s;
      }
      .ci:focus {
        border-bottom-color: var(--p);
        color: #fff;
      }
      .bi {
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--g);
        color: var(--g);
        font-family: "Orbitron", sans-serif;
        font-size: 17px;
        font-weight: 700;
        outline: none;
        padding: 1px 4px;
        text-shadow: 0 0 10px var(--g);
        width: 88px;
        transition: all 0.2s;
      }
      .bi:focus {
        border-bottom-color: var(--y);
        color: var(--y);
      }
      .brow2h {
        display: flex;
        align-items: flex-end;
        gap: 5px;
      }
      .bu2 {
        font-family: "Orbitron", sans-serif;
        font-size: 9px;
        color: var(--g);
        margin-bottom: 3px;
        letter-spacing: 2px;
      }
      .hsep {
        flex: 1;
      }
      .mbtns {
        display: flex;
        gap: 5px;
      }
      .cb {
        background: transparent;
        border: 1px solid var(--c);
        color: var(--c);
        font-family: "Share Tech Mono", monospace;
        font-size: 9px;
        letter-spacing: 2px;
        padding: 5px 11px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.14s;
        position: relative;
        overflow: hidden;
        white-space: nowrap;
      }
      .cb::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 245, 255, 0.12),
          transparent
        );
        transition: left 0.3s;
      }
      .cb:hover::after {
        left: 100%;
      }
      .cb:hover {
        background: rgba(0, 245, 255, 0.07);
        box-shadow: 0 0 13px rgba(0, 245, 255, 0.3);
      }
      .cb.act {
        background: rgba(0, 245, 255, 0.12);
        box-shadow: 0 0 16px rgba(0, 245, 255, 0.4);
      }
      .cb.pk {
        border-color: var(--p);
        color: var(--p);
      }
      .cb.pk:hover {
        background: rgba(255, 0, 128, 0.07);
        box-shadow: 0 0 13px rgba(255, 0, 128, 0.3);
      }
      .cb.gn {
        border-color: var(--g);
        color: var(--g);
      }
      .cb.gn:hover {
        background: rgba(0, 255, 65, 0.07);
        box-shadow: 0 0 13px rgba(0, 255, 65, 0.3);
      }
      .cb:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        pointer-events: none;
      }
      .apanel {
        display: flex;
        align-items: center;
        gap: 7px;
        padding-left: 10px;
        border-left: 1px solid var(--border);
      }
      .ti {
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--c);
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        padding: 4px 7px;
        outline: none;
        width: 62px;
        text-align: center;
        transition: all 0.14s;
      }
      .ti:focus {
        border-color: var(--c);
        box-shadow: 0 0 7px rgba(0, 245, 255, 0.3);
      }

      /* ─── TOOLBAR ─────────────────────────────────── */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 5px 16px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        position: relative;
        z-index: 10;
        flex-wrap: wrap;
      }
      .tlbl {
        font-size: 8px;
        color: var(--dim);
        letter-spacing: 1px;
        white-space: nowrap;
      }
      .msgi {
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--y);
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        padding: 4px 8px;
        outline: none;
        width: 200px;
        transition: all 0.14s;
      }
      .msgi::placeholder {
        color: var(--dim);
      }
      .msgi:focus {
        border-color: var(--y);
        box-shadow: 0 0 7px rgba(255, 234, 0, 0.2);
      }
      .mcc {
        font-size: 8px;
        color: var(--dim);
        letter-spacing: 1px;
        min-width: 32px;
      }
      .tsep {
        width: 1px;
        height: 20px;
        background: var(--border);
        margin: 0 3px;
        flex-shrink: 0;
      }
      .zoombx {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .zval {
        font-family: "Orbitron", sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--c);
        width: 42px;
        text-align: center;
        letter-spacing: 1px;
      }
      .zb {
        background: transparent;
        border: 1px solid var(--dim);
        color: var(--dim);
        font-family: "Orbitron", sans-serif;
        font-size: 13px;
        font-weight: 700;
        width: 23px;
        height: 23px;
        cursor: pointer;
        transition: all 0.14s;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }
      .zb:hover {
        border-color: var(--c);
        color: var(--c);
        box-shadow: 0 0 8px rgba(0, 245, 255, 0.3);
      }
      .jb {
        background: transparent;
        border: 1px solid var(--dim);
        color: var(--dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 8px;
        letter-spacing: 1px;
        padding: 4px 8px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.14s;
        white-space: nowrap;
      }
      .jb:hover {
        border-color: var(--c);
        color: var(--c);
      }

      /* ─── STATS BAR ───────────────────────────────── */
      #statsBar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 4px 16px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        font-size: 9px;
        letter-spacing: 1px;
        z-index: 10;
        position: relative;
      }
      .ldot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--g);
        box-shadow: 0 0 6px var(--g);
        animation: blink 1.4s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }
      .st {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .sl {
        color: var(--dim);
      }
      .sv {
        color: var(--c);
      }
      .sv.g {
        color: var(--g);
      }
      .sv.p {
        color: var(--p);
      }
      .sv.y {
        color: var(--y);
      }

      /* ─── CHAIN AREA ──────────────────────────────── */
      #chainArea {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      #vp {
        flex: 1;
        overflow: hidden;
        position: relative;
        cursor: grab;
      }
      #vp:active {
        cursor: grabbing;
      }
      #vp::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
        background-size: 44px 44px;
      }
      #track {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* Block / connector wrappers (absolutely placed in track) */
      .bwrap {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
      }
      .cwrap {
        position: absolute;
        top: 50%;
        transform: translateY(-1px);
        height: 2px;
      }

      /* ─── BLOCK CARD ──────────────────────────────── */
      .block {
        background: var(--panel);
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
      }
      .co {
        position: absolute;
        width: 7px;
        height: 7px;
        border-color: var(--dim);
        border-style: solid;
      }
      .co.tl {
        top: -1px;
        left: -1px;
        border-width: 2px 0 0 2px;
      }
      .co.tr {
        top: -1px;
        right: -1px;
        border-width: 2px 2px 0 0;
      }
      .co.bl {
        bottom: -1px;
        left: -1px;
        border-width: 0 0 2px 2px;
      }
      .co.br {
        bottom: -1px;
        right: -1px;
        border-width: 0 2px 2px 0;
      }
      .block.mined {
        border-color: rgba(0, 255, 65, 0.22);
      }
      .block.mined .co {
        border-color: rgba(0, 255, 65, 0.4);
      }
      .block.current {
        border-color: rgba(0, 245, 255, 0.65);
        box-shadow:
          0 0 22px rgba(0, 245, 255, 0.22),
          inset 0 0 22px rgba(0, 245, 255, 0.04);
        animation: cpulse 2.3s ease-in-out infinite;
      }
      .block.current .co {
        border-color: var(--c);
      }
      @keyframes cpulse {
        0%,
        100% {
          box-shadow:
            0 0 18px rgba(0, 245, 255, 0.2),
            inset 0 0 18px rgba(0, 245, 255, 0.04);
        }
        50% {
          box-shadow:
            0 0 34px rgba(0, 245, 255, 0.4),
            inset 0 0 26px rgba(0, 245, 255, 0.08);
        }
      }
      .block.genesis {
        border-color: rgba(255, 234, 0, 0.35);
      }
      .block.genesis .co {
        border-color: rgba(255, 234, 0, 0.5);
      }
      .bh {
        background: rgba(255, 255, 255, 0.018);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .block.mined .bh {
        background: rgba(0, 255, 65, 0.04);
      }
      .block.current .bh {
        background: rgba(0, 245, 255, 0.06);
      }
      .block.genesis .bh {
        background: rgba(255, 234, 0, 0.05);
      }
      .bidx {
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        color: var(--dim);
        letter-spacing: 1px;
      }
      .block.mined .bidx {
        color: var(--g);
      }
      .block.current .bidx {
        color: var(--c);
      }
      .block.genesis .bidx {
        color: var(--y);
      }
      .bst {
        letter-spacing: 1px;
        color: var(--dim);
      }
      .bst.m {
        color: var(--g);
      }
      .bst.p {
        color: var(--c);
      }
      .bhash {
        color: var(--dim);
        word-break: break-all;
        line-height: 1.4;
        border-bottom: 1px solid var(--border);
      }
      .bhash em {
        color: var(--c);
        font-style: normal;
      }
      .block.mined .bhash em {
        color: var(--g);
      }
      .block.genesis .bhash em {
        color: var(--y);
      }
      .brows {
        display: flex;
        flex-direction: column;
      }
      .brow {
        display: flex;
        justify-content: space-between;
      }
      .brk {
        color: var(--dim);
      }
      .brv {
        color: var(--text);
      }
      .brv.g {
        color: var(--g);
      }
      .mine-trigger button {
        width: 100%;
        background: rgba(0, 245, 255, 0.07);
        border: 1px solid rgba(0, 245, 255, 0.4);
        color: var(--c);
        font-family: "Share Tech Mono", monospace;
        letter-spacing: 2px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.14s;
      }
      .mine-trigger button:hover {
        background: rgba(0, 245, 255, 0.18);
        box-shadow: 0 0 10px rgba(0, 245, 255, 0.4);
      }
      .mine-trigger button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* connector line */
      .cline {
        width: 100%;
        height: 100%;
        position: relative;
      }
      .cline.lit {
        background: linear-gradient(90deg, var(--g), var(--c));
      }
      .cline.dim {
        background: var(--border);
      }
      .cline.lit::after {
        content: "▶";
        position: absolute;
        right: -8px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 9px;
        color: var(--c);
        text-shadow: 0 0 5px var(--c);
      }
      .cline.dim::after {
        content: "▶";
        position: absolute;
        right: -8px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 9px;
        color: var(--border);
      }

      /* ─── SCROLLBAR ───────────────────────────────── */
      #sbArea {
        height: 36px;
        margin: 0 8px 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }
      .sbl {
        font-size: 8px;
        color: var(--dim);
        letter-spacing: 1px;
      }
      .sb-arrow {
        flex-shrink: 0;
        width: 32px;
        height: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--dim);
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.13s;
        user-select: none;
      }
      .sb-arrow:hover {
        border-color: var(--c);
        color: var(--c);
        box-shadow: 0 0 8px rgba(0, 245, 255, 0.3);
      }
      .sb-arrow:active {
        background: rgba(0, 245, 255, 0.1);
      }
      #strack {
        flex: 1;
        height: 18px;
        background: var(--bg2);
        border: 1px solid var(--border);
        position: relative;
        cursor: pointer;
        border-radius: 0;
      }
      #sthumb {
        position: absolute;
        top: 0;
        height: 100%;
        min-width: 28px;
        background: linear-gradient(
          180deg,
          rgba(0, 245, 255, 0.35),
          rgba(0, 245, 255, 0.15)
        );
        border: 1px solid rgba(0, 245, 255, 0.5);
        box-shadow: 0 0 8px rgba(0, 245, 255, 0.25);
        cursor: grab;
        transition:
          background 0.14s,
          box-shadow 0.14s;
      }
      #sthumb:hover {
        background: linear-gradient(
          180deg,
          rgba(255, 0, 128, 0.45),
          rgba(255, 0, 128, 0.2)
        );
        border-color: rgba(255, 0, 128, 0.6);
        box-shadow: 0 0 10px rgba(255, 0, 128, 0.4);
      }
      #sthumb:active {
        cursor: grabbing;
      }
      #sPos {
        font-size: 8px;
        color: var(--dim);
        letter-spacing: 1px;
        white-space: nowrap;
        min-width: 80px;
      }

      /* ─── MINING PANEL ────────────────────────────── */
      #overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1000;
      }
      .mpanel {
        position: absolute;
        background: var(--bg2);
        border: 1px solid var(--c);
        box-shadow:
          0 0 40px rgba(0, 245, 255, 0.22),
          0 0 80px rgba(0, 245, 255, 0.07);
        padding: 14px;
        width: 244px;
        pointer-events: all;
      }
      .mpanel .co {
        border-color: var(--c);
      }
      .mpanel .co.tl {
        top: -1px;
        left: -1px;
        border-width: 2px 0 0 2px;
      }
      .mpanel .co.tr {
        top: -1px;
        right: -1px;
        border-width: 2px 2px 0 0;
      }
      .mpanel .co.bl {
        bottom: -1px;
        left: -1px;
        border-width: 0 0 2px 2px;
      }
      .mpanel .co.br {
        bottom: -1px;
        right: -1px;
        border-width: 0 2px 2px 0;
      }
      .parr {
        position: absolute;
        top: -9px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-bottom: 9px solid var(--c);
      }
      .parr::before {
        content: "";
        position: absolute;
        top: 2px;
        left: -7px;
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-bottom: 8px solid var(--bg2);
      }
      .parr.dn {
        top: auto;
        bottom: -9px;
        border-bottom: none;
        border-top: 9px solid var(--c);
      }
      .parr.dn::before {
        top: auto;
        bottom: 2px;
        border-bottom: none;
        border-top: 8px solid var(--bg2);
      }
      .pt {
        font-family: "Orbitron", sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--c);
        letter-spacing: 3px;
        text-shadow: 0 0 10px var(--c);
        margin-bottom: 2px;
      }
      .ps {
        font-size: 8px;
        color: var(--dim);
        letter-spacing: 1px;
        margin-bottom: 12px;
      }
      .sgrid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        margin-bottom: 10px;
      }
      .sec {
        aspect-ratio: 1;
        background: var(--panel);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 18px;
        transition: all 0.12s;
        position: relative;
        flex-direction: column;
      }
      .sec .sn {
        font-size: 6px;
        color: var(--dim);
        position: absolute;
        bottom: 3px;
        right: 4px;
      }
      .sec:hover:not(:disabled):not(.tried):not(.ok):not(.sc) {
        border-color: var(--c);
        background: rgba(0, 245, 255, 0.1);
        box-shadow: 0 0 11px rgba(0, 245, 255, 0.35);
      }
      .sec.tried {
        border-color: rgba(255, 0, 128, 0.4);
        background: rgba(255, 0, 128, 0.06);
        cursor: not-allowed;
      }
      .sec.ok {
        border-color: var(--g);
        background: rgba(0, 255, 65, 0.14);
        box-shadow: 0 0 18px rgba(0, 255, 65, 0.5);
        animation: okpop 0.4s ease;
        cursor: default;
      }
      .sec.sc {
        border-color: var(--y);
        background: rgba(255, 234, 0, 0.1);
        box-shadow: 0 0 12px rgba(255, 234, 0, 0.4);
        animation: scpulse 0.2s ease infinite alternate;
      }
      @keyframes okpop {
        0% {
          transform: scale(0.8);
        }
        60% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes scpulse {
        to {
          box-shadow: 0 0 20px rgba(255, 234, 0, 0.7);
        }
      }
      .pi {
        font-size: 8px;
        color: var(--dim);
        text-align: center;
        letter-spacing: 1px;
      }
      .pi span {
        color: var(--c);
      }
      .pprog {
        height: 2px;
        background: var(--border);
        margin-top: 8px;
        overflow: hidden;
      }
      .ppfill {
        height: 100%;
        background: var(--c);
        box-shadow: 0 0 6px var(--c);
        transition: width 0.06s linear;
      }
      .past {
        font-size: 8px;
        color: var(--y);
        text-align: center;
        letter-spacing: 1px;
        margin-top: 5px;
        min-height: 12px;
      }
      .pclose {
        position: absolute;
        top: 7px;
        right: 8px;
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        font-size: 12px;
        padding: 2px 5px;
        font-family: "Share Tech Mono", monospace;
        transition: color 0.14s;
      }
      .pclose:hover {
        color: var(--p);
      }
      .pmsgbox {
        font-size: 8px;
        color: var(--y);
        margin-top: 7px;
        padding: 4px 6px;
        border: 1px solid rgba(255, 234, 0, 0.2);
        background: rgba(255, 234, 0, 0.04);
        word-break: break-word;
        letter-spacing: 0.5px;
        line-height: 1.4;
      }
      .pmsgbox-lbl {
        font-size: 7px;
        color: var(--dim);
        letter-spacing: 1px;
        margin-bottom: 2px;
      }

      /* flash */
      .flash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9997;
        animation: fo 0.5s ease forwards;
      }
      .flash.ok {
        background: rgba(0, 255, 65, 0.06);
      }
      .flash.fail {
        background: rgba(255, 0, 128, 0.06);
      }
      @keyframes fo {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      /* block layout: flex column so mine button is pinned to bottom */
      .block {
        display: flex;
        flex-direction: column;
      }
      .bb {
        flex: 1;
        overflow: auto;
      }

      /* mine button always at bottom */
      .mine-trigger {
        margin-top: auto;
        border-top: 1px solid var(--border);
      }

      /* textarea inside block */
      .bta {
        width: 100%;
        background: rgba(255, 234, 0, 0.04);
        border: 1px solid rgba(255, 234, 0, 0.25);
        border-radius: 0;
        color: var(--y);
        font-family: "Share Tech Mono", monospace;
        resize: none;
        outline: none;
        line-height: 1.45;
        transition: border-color 0.15s;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 234, 0, 0.3) transparent;
      }
      .bta:focus {
        border-color: rgba(255, 234, 0, 0.6);
        background: rgba(255, 234, 0, 0.07);
      }
      .bta::placeholder {
        color: rgba(255, 234, 0, 0.3);
        font-style: italic;
      }

      /* coin drop animation */
      @keyframes coinFly {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        55% {
          transform: translateY(-90px) scale(1.5);
          opacity: 1;
        }
        100% {
          transform: translateY(-160px) scale(0.7);
          opacity: 0;
        }
      }
      .coin-anim {
        position: fixed;
        pointer-events: none;
        z-index: 9990;
        font-size: 32px;
        animation: coinFly 1.1s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
      }

      /* new block spawn */
      @keyframes blockSpawn {
        0% {
          transform: scaleX(0.4) scaleY(0.7);
          opacity: 0;
          filter: brightness(3);
        }
        55% {
          transform: scaleX(1.06) scaleY(1.04);
          opacity: 1;
          filter: brightness(1.4);
        }
        100% {
          transform: scaleX(1) scaleY(1);
          opacity: 1;
          filter: brightness(1);
        }
      }
      .block.spawn {
        animation: blockSpawn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
    </style>
  </head>
  <body>

    <!-- STATS BAR -->
    <div id="statsBar">
      <div class="ldot" id="ldot"></div>
      <div class="st">

      </div>
      <div class="st">
        <span class="sl">BLOCK</span> <span class="sv" id="sBlock">#0000</span>
      </div>
      <div class="st">
        <span class="sl">MINED</span> <span class="sv g" id="sMined">0</span>
      </div>
      <div class="st">
        <span class="sl">COIN</span> <span class="sv y" id="sCoin">NEONX</span>
      </div>
      <div class="st">
        <span class="sl">H/S</span> <span class="sv p" id="sHS">0</span>
      </div>
      <div class="st">
        <span class="sl">ZOOM</span> <span class="sv" id="sZoom">100%</span>
      </div>
      <div class="st">
        <span class="sl">TEXT</span> <span class="sv y" id="sTxt">100%</span>

      </div>
    </div>

    <!-- CHAIN -->
    <div id="chainArea">
      <div id="vp"><div id="track"></div></div>
      <div id="sbArea">
        <button class="sb-arrow" id="sbLeft" title="Scroll left">◀</button>
        <div id="strack"><div id="sthumb"></div></div>
        <button class="sb-arrow" id="sbRight" title="Scroll right">▶</button>
        <span id="sPos">—</span>
      </div>
    </div>

    <!-- MINING OVERLAY -->
    <div id="overlay"></div>

    <script>
      "use strict";

      // ══════════════════════ CONSTANTS ══════════════════════
      const BW = 178,
        BH = 168,
        CW = 40; // base block/connector dims at zoom 1
      const LEAD = 48; // left breathing room so block #0 isn't flush to edge

      // ══════════════════════ STATE ══════════════════════
      const S = {
        name: "NEONX",
        balance: 0,
        mined: 0,
        blocks: new Map(),
        nextMsg: "",
        zoom: 1.0,
        scrollX: 0,
        textScale: 1.0,
        mode: "manual",
        panelOpen: false,
        mining: false,
        panel: { tried: new Set(), correct: -1, blockIdx: -1, scanning: -1 },
        hashes: 0,
        hs: 0,
        spawnBlock: -1,
      };

      // ══════════════════════ ZOOM HELPERS ══════════════════════
      const bw = (z = S.zoom) => Math.max(22, Math.round(BW * z));
      const bh = (z = S.zoom) => Math.max(18, Math.round(BH * z));
      const bcw = (z = S.zoom) => Math.max(5, Math.round(CW * z));
      const bu = (z = S.zoom) => bw(z) + bcw(z);

      function vpW() {
        return document.getElementById("vp").clientWidth || 800;
      }

      // Total chain width in pixels at zoom z
      // = (mined blocks + pending block) laid out as slots, minus trailing connector
      function totalPx(z = S.zoom) {
        const n = S.mined + 1;
        if (n === 1) return LEAD + bw(z) + 4;
        return LEAD + (n - 1) * bu(z) + bw(z) + 4;
      }

      function clampScroll(sx, z = S.zoom) {
        return Math.max(0, Math.min(sx, Math.max(0, totalPx(z) - vpW())));
      }

      function getVisRange(z = S.zoom) {
        const unit = bu(z);
        const visStart = S.scrollX - LEAD; // content X relative to chain start
        const first = Math.max(0, Math.floor(visStart / unit));
        const last = Math.min(
          S.mined,
          Math.ceil((visStart + vpW()) / unit) + 1,
        );
        return [first, last];
      }

      // ══════════════════════ PRNG / HASH ══════════════════════
      function rng(seed) {
        let t = (seed ^ 0xdeadbeef) >>> 0;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
      function correctSector(idx) {
        return Math.floor(rng(idx * 2654435761 + 1013904223) * 9);
      }
      function fakeHash(idx) {
        const h = "0123456789abcdef";
        let s = "0x";
        for (let i = 0; i < 32; i++)
          s += h[Math.floor(rng(idx * 1e7 + i * 9999) * 16)];
        return s;
      }
      function escH(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function formatDate(iso) {
        const d = new Date(iso);
        const pad = (n) => String(n).padStart(2, "0");
        return `${pad(d.getDate())}.${pad(d.getMonth() + 1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }

      // ══════════════════════ RENDER CHAIN ══════════════════════
      function renderChain() {
        const z = S.zoom,
          track = document.getElementById("track");
        const [first, last] = getVisRange(z);
        const BLW = bw(z),
          BLH = bh(z),
          CNW = bcw(z),
          UNIT = bu(z);

        let html = "";
        for (let i = first; i <= last; i++) {
          if (i > S.mined) break;
          const sx = LEAD + Math.round(i * UNIT - S.scrollX);

          html += `<div class="bwrap" style="left:${sx}px;width:${BLW}px;height:${BLH}px;">
      ${renderBlock(i, z, BLW, BLH)}
    </div>`;

          // connector after block i — only from mined blocks (not after pending)
          if (i < S.mined) {
            const cx = sx + BLW;
            const lit = i < S.mined - 1; // dim for last-mined→pending edge
            html += `<div class="cwrap" style="left:${cx}px;width:${CNW}px;">
        <div class="cline ${lit ? "lit" : "dim"}"></div>
      </div>`;
          }
        }
        track.innerHTML = html;
        updateScrollbar();
        updateStats();
      }

      function renderBlock(idx, z, w, h) {
        const mined = idx < S.mined;
        const current = idx === S.mined;
        const genesis = idx === 0;
        const data = S.blocks.get(idx) || null;

        let cls = mined ? "mined" : current ? "current" : "";
        if (genesis) cls += " genesis";
        const stCls = mined ? "m" : current ? "p" : "";

        // ── NANO (zoom < 0.3) ──────────────────────
        if (z < 0.3) {
          const fs = Math.max(5, Math.round(7 * z));
          return `<div class="block ${cls}" style="width:${w}px;height:${h}px;
      display:flex;align-items:center;justify-content:center;" data-i="${idx}">
      <span style="font-size:${fs}px;font-family:'Orbitron',sans-serif;opacity:.65">${idx}</span>
    </div>`;
        }

        // ── MINI (0.3 ≤ zoom < 0.65) ───────────────
        if (z < 0.65) {
          const f1 = Math.round(Math.max(7, 9 * z));
          const f2 = Math.round(Math.max(5, 7 * z));
          const pd = Math.round(Math.max(3, 5 * z));
          const msg = data?.msg || (current ? S.nextMsg : "");
          const status = mined ? "MINED" : current ? "PEND" : "";
          return `<div class="block ${cls}" data-i="${idx}"
      style="width:${w}px;height:${h}px;padding:${pd}px;
             display:flex;flex-direction:column;justify-content:space-between;">
      <div class="co tl"></div><div class="co tr"></div>
      <div class="co bl"></div><div class="co br"></div>
      <div>
        <div class="bidx" style="font-size:${f1}px">#${String(idx).padStart(3, "0")}</div>
        <div class="bst ${stCls}" style="font-size:${f2}px">${status}</div>
      </div>
      ${msg ? `<div style="font-size:${f2}px;color:var(--y);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;opacity:.8">${escH(msg)}</div>` : ""}
    </div>`;
        }

        // ── FULL (zoom ≥ 0.65) ─────────────────────
        const sc = Math.min(z, 1.5);
        const ts = S.textScale;

        const fs = Math.round(7.5 * sc * ts) + "px";
        const tfs = Math.round(9 * sc * ts) + "px";
        const hfs = Math.round(6.5 * Math.min(z, 1.3) * ts) + "px";
        const vfs = Math.round(6 * Math.min(z, 1.3) * ts) + "px";
        const bfs = Math.round(7.5 * Math.min(z, 1.3) * ts) + "px";

        const pd = Math.round(7 * sc) + "px";
        const pdv = Math.round(4 * sc) + "px";
        const rg = Math.round(3 * sc) + "px";
        const bpd = Math.round(3 * Math.min(z, 1.3)) + "px";

        const hash = fakeHash(idx);
        const prev = idx > 0 ? fakeHash(idx - 1) : "0x" + "0".repeat(32);
        const nonce = correctSector(idx);
        const time = data?.date ? formatDate(data.date) : "—";
        const msg = data?.msg || (current ? S.nextMsg : "");

        const canMine =
          current && S.mode === "manual" && !S.panelOpen && !S.mining;
        const isSpawn = idx === S.spawnBlock;
        const spawnCls = isSpawn ? " spawn" : "";

        // textarea height = leftover space, min 32px
        const taRows = Math.max(
          2,
          Math.round((h * 0.22) / (parseFloat(vfs) * 1.5)),
        );

        return `<div class="block ${cls}${spawnCls}" data-i="${idx}" style="width:${w}px;height:${h}px;font-size:${fs}">
    <div class="co tl"></div><div class="co tr"></div>
    <div class="co bl"></div><div class="co br"></div>
    <div class="bh" style="padding:${pdv} ${pd}">
      <span class="bidx" style="font-size:${tfs}">#${String(idx).padStart(4, "0")}</span>
      <span class="bst ${stCls}" style="font-size:${fs}">${mined ? "MINED" : current ? "PEND" : ""}</span>
    </div>
    <div class="bb" style="padding:${pdv} ${pd}">
      <div class="bhash" style="font-size:${hfs};margin-bottom:${pdv};padding-bottom:${pdv}">
        <em>${hash.slice(0, 10)}</em>${hash.slice(10, 22)}…
      </div>
      <div class="brows" style="gap:${rg}">
        <div class="brow"><span class="brk" style="font-size:${vfs}">PREV&nbsp;</span><span class="brv" style="font-size:${hfs}">${prev.slice(0, 10)}…</span></div>
        <div class="brow"><span class="brk" style="font-size:${vfs}">TIME&nbsp;</span><span class="brv" style="font-size:${vfs}">${time}</span></div>
        <div class="brow"><span class="brk" style="font-size:${vfs}">NONCE</span><span class="brv" style="font-size:${vfs}">${mined ? nonce : "???"}</span></div>
        <div class="brow"><span class="brk" style="font-size:${vfs}">RWRD&nbsp;</span><span class="brv g" style="font-size:${vfs}">1 ${escH(S.name)}</span></div>
      </div>
      ${mined && msg ? `<div style="margin-top:${pdv};padding:${bpd} 0;border-top:1px solid rgba(255,234,0,.18);font-size:${vfs};color:var(--y);word-break:break-word;opacity:.9">${escH(msg)}</div>` : ""}
      ${
        current
          ? `<textarea class="bta" rows="${taRows}"
        style="font-size:${vfs};margin-top:${pdv};padding:${bpd};"
        maxlength="64" placeholder="block message…"
        oninput="blockMsgInput(this)"
        onclick="event.stopPropagation()"
        onmousedown="event.stopPropagation()"
      >${escH(S.nextMsg)}</textarea>`
          : ""
      }
    </div>
    ${
      current
        ? `<div class="mine-trigger" id="mine-btn-${idx}" style="padding:${bpd} ${pd}">
      <button onclick="openPanel(${idx})" ${canMine ? "" : "disabled"} style="font-size:${bfs};padding:${bpd} 0">⬡ MINE BLOCK</button>
    </div>`
        : ""
    }
  </div>`;
      }

      // ══════════════════════ SCROLLBAR ══════════════════════
      let sDrag = false,
        sDragX0 = 0,
        sDragS0 = 0;

      function updateScrollbar() {
        const thumb = document.getElementById("sthumb");
        const pos = document.getElementById("sPos");
        const total = totalPx(),
          vw = vpW();
        if (total <= vw) {
          thumb.style.width = "100%";
          thumb.style.left = "0";
        } else {
          const tw = Math.max(2, (vw / total) * 100);
          const tl = (S.scrollX / Math.max(1, total - vw)) * (100 - tw);
          thumb.style.width = tw + "%";
          thumb.style.left = Math.min(100 - tw, tl) + "%";
        }
        const [first, last] = getVisRange();
        pos.textContent = `${first}–${last} / ${S.mined}`;
        document.getElementById("sView").textContent = `${first}–${last}`;
      }

      document.getElementById("strack").addEventListener("mousedown", (e) => {
        if (e.target === document.getElementById("sthumb")) return;
        const r = document.getElementById("strack").getBoundingClientRect();
        S.scrollX = clampScroll(
          ((e.clientX - r.left) / r.width) * Math.max(0, totalPx() - vpW()),
        );
        renderChain();
      });
      document.getElementById("sthumb").addEventListener("mousedown", (e) => {
        e.stopPropagation();
        sDrag = true;
        sDragX0 = e.clientX;
        sDragS0 = S.scrollX;
        e.preventDefault();
      });
      document.addEventListener("mousemove", (e) => {
        if (!sDrag) return;
        const r = document.getElementById("strack").getBoundingClientRect();
        S.scrollX = clampScroll(
          sDragS0 +
            ((e.clientX - sDragX0) / r.width) * Math.max(1, totalPx() - vpW()),
        );
        renderChain();
      });
      document.addEventListener("mouseup", () => {
        sDrag = false;
      });

      // ── Scroll arrow buttons (hold to repeat) ──────────
      function scrollBy(dir) {
        S.scrollX = clampScroll(S.scrollX + dir * bu() * 0.6);
        renderChain();
      }
      (function setupArrows() {
        let _t, _iv;
        function startScroll(dir) {
          scrollBy(dir);
          _t = setTimeout(() => {
            _iv = setInterval(() => scrollBy(dir), 60);
          }, 320);
        }
        function stopScroll() {
          clearTimeout(_t);
          clearInterval(_iv);
        }
        ["sbLeft", "sbRight"].forEach((id, i) => {
          const dir = i === 0 ? -1 : 1;
          const btn = document.getElementById(id);
          btn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            startScroll(dir);
          });
          btn.addEventListener("mouseup", stopScroll);
          btn.addEventListener("mouseleave", stopScroll);
        });
      })();

      // ══════════════════════ DRAG PAN ══════════════════════
      let vpDrag = false,
        vpDX0 = 0,
        vpDS0 = 0;
      const vpEl = document.getElementById("vp");
      vpEl.addEventListener("mousedown", (e) => {
        if (e.target.closest("button")) return;
        vpDrag = true;
        vpDX0 = e.clientX;
        vpDS0 = S.scrollX;
        e.preventDefault();
      });
      document.addEventListener("mousemove", (e) => {
        if (!vpDrag) return;
        S.scrollX = clampScroll(vpDS0 - (e.clientX - vpDX0));
        renderChain();
      });
      document.addEventListener("mouseup", () => {
        vpDrag = false;
      });

      // Ctrl+Scroll = zoom, Scroll = pan
      vpEl.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          if (e.ctrlKey || e.metaKey)
            setZoom(S.zoom + (e.deltaY > 0 ? -0.1 : 0.1));
          else {
            S.scrollX = clampScroll(S.scrollX + (e.deltaX || e.deltaY) * 0.9);
            renderChain();
          }
        },
        { passive: false },
      );

      // Keyboard
      document.addEventListener("keydown", (e) => {
        if (
          document.activeElement &&
          document.activeElement.tagName === "INPUT"
        )
          return;
        if (e.key === "ArrowRight") {
          S.scrollX = clampScroll(S.scrollX + bu());
          renderChain();
        }
        if (e.key === "ArrowLeft") {
          S.scrollX = clampScroll(S.scrollX - bu());
          renderChain();
        }
        if (e.key === "+" || e.key === "=") setZoom(S.zoom + 0.1);
        if (e.key === "-") setZoom(S.zoom - 0.1);
      });

      // ══════════════════════ ZOOM ══════════════════════
      function setZoom(z) {
        z = Math.max(0.1, Math.min(2.5, parseFloat(z.toFixed(2))));
        const oldZ = S.zoom;
        const centre = (S.scrollX + vpW() / 2) / bu(oldZ); // logical block position at centre
        S.zoom = z;
        S.scrollX = clampScroll(centre * bu(z) - vpW() / 2);
        const pct = Math.round(z * 100) + "%";
        document.getElementById("zval").textContent = pct;
        document.getElementById("sZoom").textContent = pct;
        renderChain();
        localStorage.setItem("cm_zoom", z);
      }

      document
        .getElementById("btnZIn")
        .addEventListener("click", () => setZoom(S.zoom + 0.1));
      document
        .getElementById("btnZOut")
        .addEventListener("click", () => setZoom(S.zoom - 0.1));

      // ══════════════════════ TEXT SCALE ══════════════════════
      function setTextScale(t) {
        t = Math.max(1.0, Math.min(5.0, parseFloat(t.toFixed(2))));
        S.textScale = t;
        const pct = Math.round(t * 100) + "%";
        document.getElementById("tval").textContent = pct;
        document.getElementById("sTxt").textContent = pct;
        renderChain();
        localStorage.setItem("cm_textScale", t);
      }

      document
        .getElementById("btnTxtIn")
        .addEventListener("click", () => setTextScale(S.textScale + 0.25));
      document
        .getElementById("btnTxtOut")
        .addEventListener("click", () => setTextScale(S.textScale - 0.25));

      // ══════════════════════ STATS ══════════════════════
      function updateStats() {
        document.getElementById("sBlock").textContent =
          "#" + String(S.mined).padStart(4, "0");
        document.getElementById("sMined").textContent = S.mined;
        document.getElementById("sCoin").textContent = S.name;
      }
      setInterval(() => {
        S.hs = S.hashes;
        S.hashes = 0;
        document.getElementById("sHS").textContent = S.hs;
      }, 1000);

      // ══════════════════════ MINING PANEL ══════════════════════
      function openPanel(blockIdx) {
        if (S.panelOpen || S.mining) return;
        S.panelOpen = true;
        S.panel = {
          tried: new Set(),
          correct: correctSector(blockIdx),
          blockIdx,
          scanning: -1,
        };
        jumpToCurrent();
        setTimeout(() => {
          drawPanel();
          renderChain();
        }, 30);
      }

      function drawPanel() {
        const ov = document.getElementById("overlay");
        const { tried, correct, blockIdx, scanning } = S.panel;

        // Anchor to the MINE BLOCK button, fallback to block element
        const btnEl = document.querySelector(`#mine-btn-${blockIdx} button`);
        const blockEl = document.querySelector(`[data-i="${blockIdx}"]`);
        const anchorEl = btnEl || blockEl;
        let style = "left:50%;top:50%;transform:translate(-50%,-50%);";
        let arrCls = "";
        if (anchorEl) {
          const r = anchorEl.getBoundingClientRect(),
            pw = 244,
            ph = 310;
          let left = r.left + r.width / 2 - pw / 2;
          left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
          const spaceAbove = r.top,
            spaceBelow = window.innerHeight - r.bottom;
          if (spaceBelow >= ph || spaceBelow >= spaceAbove) {
            style = `left:${left}px;top:${r.bottom + 10}px;`;
            arrCls = "";
          } else {
            style = `left:${left}px;top:${r.top - ph - 10}px;`;
            arrCls = "dn";
          }
        }

        let sHtml = "";
        for (let i = 0; i < 9; i++) {
          const isOK = tried.has(i) && i === correct;
          const isTry = tried.has(i) && i !== correct;
          const isSc = scanning === i && !tried.has(i);
          const cls = isOK ? "ok" : isTry ? "tried" : isSc ? "sc" : "";
          const ico = isOK ? "🔓" : isTry ? "🔐" : isSc ? "🔍" : "🔒";
          const dis = isTry || isOK || S.mode === "auto" ? "disabled" : "";
          sHtml += `<button class="sec ${cls}" onclick="trySector(${i})" ${dis}>${ico}<span class="sn">S${i + 1}</span></button>`;
        }
        const n = tried.size,
          msg = S.nextMsg;

        ov.innerHTML = `<div class="mpanel" style="${style}">
    <div class="co tl"></div><div class="co tr"></div>
    <div class="co bl"></div><div class="co br"></div>
    <div class="parr ${arrCls}"></div>
    <button class="pclose" onclick="closePanel()">✕</button>
    <div class="pt">BLOCK #${String(blockIdx).padStart(4, "0")}</div>
    <div class="ps">SELECT A SECTOR TO CRACK THE HASH</div>
    <div class="sgrid">${sHtml}</div>
    <div class="pi">TRIED: <span>${n}</span>/9 &nbsp; LEFT: <span>${9 - n}</span></div>
    ${msg ? `<div class="pmsgbox"><div class="pmsgbox-lbl">PENDING MSG</div>${escH(msg)}</div>` : ""}
    <div class="pprog" ${S.mining ? "" : 'style="display:none"'}>
      <div class="ppfill" id="ppfill" style="width:${((n / 9) * 100).toFixed(0)}%"></div>
    </div>
    <div class="past" id="past"></div>
  </div>`;
      }

      function closePanel() {
        stopAuto(false);
        S.panelOpen = false;
        document.getElementById("overlay").innerHTML = "";
        renderChain();
      }

      async function trySector(i) {
        if (!S.panelOpen) return;
        const { tried, correct } = S.panel;
        if (tried.has(i)) return;
        tried.add(i);
        S.hashes++;
        if (i === correct) {
          // grab the button before drawPanel replaces the DOM
          const secBtn = document.querySelectorAll(".sec")[i] || null;
          playSuccess();
          spawnCoin(secBtn);
          S.panel.scanning = -1;
          drawPanel();
          await sleep(360);
          await mineSuccess();
        } else {
          playFail();
          drawPanel();
        }
      }

      async function mineSuccess() {
        const idx = S.mined,
          msg = S.nextMsg;

        S.blocks.set(idx, { date: new Date().toISOString(), msg });
        S.balance++;
        S.mined++;
        S.nextMsg = "";
        document.getElementById("iMsg").value = "";
        document.getElementById("mcc").textContent = "0/64";
        document.getElementById("iBalance").value = S.balance;
        flash("ok");
        saveAll();
        S.panelOpen = false;
        document.getElementById("overlay").innerHTML = "";

        // Mark new pending block for spawn animation
        S.spawnBlock = S.mined;
        jumpToCurrent();
        renderChain();
        // Clear spawn flag after animation finishes
        setTimeout(() => {
          S.spawnBlock = -1;
        }, 600);
      }

      // ══════════════════════ AUTO MINING ══════════════════════
      let autoActive = false,
        autoTimer = null;

      function startAuto() {
        if (autoActive) return;
        autoActive = true;
        S.mining = true;
        document.getElementById("btnRun").style.display = "none";
        document.getElementById("btnStop").style.display = "";
        setStatus("AUTO MINING", "p");
        const tries = parseInt(document.getElementById("iTries").value) || 81;
        autoRunBlocks(tries);
      }

      function autoRunBlocks(left) {
        if (!autoActive || left <= 0) {
          stopAuto(left <= 0);
          return;
        }
        const blockIdx = S.mined,
          correct = correctSector(blockIdx);
        S.panel = { tried: new Set(), correct, blockIdx, scanning: -1 };
        S.panelOpen = true;
        jumpToCurrent();
        setTimeout(() => {
          drawPanel();
          renderChain();
        }, 30);

        const secs = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        for (let i = 8; i > 0; i--) {
          const j = Math.floor(rng(blockIdx * 97 + i * 31) * (i + 1));
          [secs[i], secs[j]] = [secs[j], secs[i]];
        }
        let si = 0;
        const step = () => {
          if (!autoActive) return;
          if (si >= secs.length) {
            stopAuto(true);
            return;
          }
          const s = secs[si++];
          left--;
          S.panel.scanning = s;
          S.panel.tried.add(s);
          S.hashes++;
          playTick();
          const pf = document.getElementById("ppfill");
          const ps = document.getElementById("past");
          if (pf) pf.style.width = (si / 9) * 100 + "%";
          if (ps) ps.textContent = `SECTOR S${s + 1} · LEFT: ${left}`;
          drawPanel();
          if (s === correct) {
            playSuccess();
            const secBtn = document.querySelectorAll(".sec")[s] || null;
            spawnCoin(secBtn);
            S.panel.scanning = -1;
            drawPanel();
            autoTimer = setTimeout(async () => {
              await mineSuccess();
              if (autoActive && left > 0)
                autoTimer = setTimeout(() => autoRunBlocks(left), 160);
              else stopAuto(left <= 0);
            }, 290);
          } else autoTimer = setTimeout(step, 72);
        };
        step();
      }

      function stopAuto(exhausted = false) {
        autoActive = false;
        S.mining = false;
        clearTimeout(autoTimer);
        autoTimer = null;
        document.getElementById("btnRun").style.display = "";
        document.getElementById("btnStop").style.display = "none";
        setStatus(exhausted ? "EXHAUSTED" : "STOPPED", "sv");
        setTimeout(() => {
          if (!autoActive) {
            S.panelOpen = false;
            document.getElementById("overlay").innerHTML = "";
            renderChain();
          }
        }, 400);
      }

      // ══════════════════════ HELPERS ══════════════════════
      function flash(type) {
        const el = document.createElement("div");
        el.className = `flash ${type}`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 500);
      }
      function setStatus(txt, cls) {
        const el = document.getElementById("sStatus");
        el.textContent = txt;
        el.className = "sv " + (cls !== "sv" ? cls : "");
        const dot = document.getElementById("ldot");
        dot.style.background = cls === "p" ? "var(--p)" : "var(--g)";
        dot.style.boxShadow =
          cls === "p" ? "0 0 6px var(--p)" : "0 0 6px var(--g)";
      }
      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }
      function jumpToCurrent() {
        const n = Math.max(1, Math.floor(vpW() / bu()));
        // Centre the current (pending) block in view
        const targetX = LEAD + S.mined * bu() - Math.floor(n / 2) * bu();
        S.scrollX = clampScroll(targetX);
      }

      // Block textarea input — syncs without re-rendering chain
      function blockMsgInput(ta) {
        S.nextMsg = ta.value.slice(0, 64);

        if (el) el.value = S.nextMsg;
        document.getElementById("mcc").textContent = S.nextMsg.length + "/64";

      // ── SOUNDS (Web Audio) ──────────────────────────────
      let _actx = null;
      function getACtx() {
        if (!_actx)
          _actx = new (window.AudioContext || window.webkitAudioContext)();
        return _actx;
      }
      function playTick() {
        try {
          const ac = getACtx(),
            now = ac.currentTime;
          const o = ac.createOscillator(),
            g = ac.createGain();
          o.connect(g);
          g.connect(ac.destination);
          o.type = "square";
          o.frequency.setValueAtTime(380, now);
          o.frequency.exponentialRampToValueAtTime(180, now + 0.07);
          g.gain.setValueAtTime(0.08, now);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
          o.start(now);
          o.stop(now + 0.08);
        } catch (e) {}
      }
      function playFail() {
        try {
          const ac = getACtx(),
            now = ac.currentTime;
          const o = ac.createOscillator(),
            g = ac.createGain();
          o.type = "sawtooth";
          o.connect(g);
          g.connect(ac.destination);
          o.frequency.setValueAtTime(130, now);
          g.gain.setValueAtTime(0.07, now);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
          o.start(now);
          o.stop(now + 0.1);
        } catch (e) {}
      }
      function playSuccess() {
        try {
          const ac = getACtx();
          [
            [0, 523],
            [110, 659],
            [220, 784],
            [330, 1046],
          ].forEach(([dt, freq]) => {
            const now = ac.currentTime + dt / 1000;
            const o = ac.createOscillator(),
              g = ac.createGain();
            o.connect(g);
            g.connect(ac.destination);
            o.type = "sine";
            o.frequency.setValueAtTime(freq, now);
            g.gain.setValueAtTime(0.18, now);
            g.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
            o.start(now);
            o.stop(now + 0.35);
          });
        } catch (e) {}
      }

      // ── COIN ANIMATION ──────────────────────────────────
      function spawnCoin(sourceEl) {
        // sourceEl: a DOM element to fly from; fallback to viewport centre
        let cx, cy;
        if (sourceEl) {
          const r = sourceEl.getBoundingClientRect();
          cx = r.left + r.width / 2;
          cy = r.top + r.height / 2;
        } else {
          cx = window.innerWidth / 2;
          cy = window.innerHeight / 2;
        }
        const coin = document.createElement("div");
        coin.className = "coin-anim";
        coin.textContent = "🪙";
        coin.style.left = cx - 16 + "px";
        coin.style.top = cy + "px";
        document.body.appendChild(coin);
        setTimeout(() => coin.remove(), 1300);
      }

      // ══════════════════════ CSV ══════════════════════
      function exportCSV() {
        let csv = "index,date,message\n";
        [...S.blocks.entries()]
          .sort((a, b) => a[0] - b[0])
          .forEach(([idx, { date, msg }]) => {
            csv += `${idx},"${date}","${(msg || "").replace(/"/g, '""')}"\n`;
          });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(
          new Blob([csv], { type: "text/csv;charset=utf-8;" }),
        );
        a.download = `${S.name}_chain.csv`;
        a.click();
      }

      function importCSV(text) {
        const lines = text.trim().split("\n");
        if (!lines.length || !lines[0].toLowerCase().includes("index"))
          return alert('Invalid CSV: expected header with "index".');
        const newBlocks = new Map();
        let maxIdx = -1,
          errs = 0;
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const parts = parseCSVLine(line);
          const idx = parseInt(parts[0]);
          if (isNaN(idx) || idx < 0) {
            errs++;
            continue;
          }
          const date =
            (parts[1] || "").replace(/^"|"$/g, "") || new Date().toISOString();
          const msg = (parts[2] || "")
            .replace(/^"|"$/g, "")
            .replace(/""/g, '"');
          newBlocks.set(idx, { date, msg });
          maxIdx = Math.max(maxIdx, idx);
        }
        if (!newBlocks.size) return alert("No valid block rows found in CSV.");
        S.blocks = newBlocks;
        S.mined = maxIdx + 1;
        S.balance = newBlocks.size;
        document.getElementById("iBalance").value = S.balance;
        saveAll();
        jumpToCurrent();
        renderChain();
        alert(
          `Imported ${newBlocks.size} block(s). Chain at block #${maxIdx}.` +
            (errs ? ` (${errs} rows skipped)` : ""),
        );
      }

      function parseCSVLine(line) {
        const r = [];
        let i = 0;
        while (i < line.length) {
          if (line[i] === '"') {
            i++;
            let f = "";
            while (i < line.length) {
              if (line[i] === '"' && line[i + 1] === '"') {
                f += '"';
                i += 2;
              } else if (line[i] === '"') {
                i++;
                break;
              } else f += line[i++];
            }
            r.push(f);
            if (line[i] === ",") i++;
          } else {
            let f = "";
            while (i < line.length && line[i] !== ",") f += line[i++];
            if (line[i] === ",") i++;
            r.push(f);
          }
        }
        return r;
      }

      // ══════════════════════ PERSIST ══════════════════════
      function saveAll() {
        localStorage.setItem("cm_name", S.name);
        localStorage.setItem("cm_balance", S.balance);
        localStorage.setItem("cm_mined", S.mined);
        localStorage.setItem("cm_zoom", S.zoom);
        localStorage.setItem("cm_textScale", S.textScale);
        try {
          const obj = {};
          S.blocks.forEach((v, k) => (obj[k] = v));
          localStorage.setItem("cm_blocks", JSON.stringify(obj));
        } catch (e) {
          console.warn("localStorage full – block data may not be fully saved");
        }
      }
      function loadAll() {
        S.name = localStorage.getItem("cm_name") || "NEONX";
        S.balance = parseFloat(localStorage.getItem("cm_balance")) || 0;
        S.mined = parseInt(localStorage.getItem("cm_mined")) || 0;
        S.zoom = parseFloat(localStorage.getItem("cm_zoom")) || 2.5;
        S.zoom = Math.max(0.1, Math.min(2.5, S.zoom));
        S.textScale = parseFloat(localStorage.getItem("cm_textScale")) || 1.75;
        S.textScale = Math.max(1.0, Math.min(5.0, S.textScale));
        try {
          const raw = localStorage.getItem("cm_blocks");
          if (raw) {
            const obj = JSON.parse(raw);
            Object.entries(obj).forEach(([k, v]) =>
              S.blocks.set(parseInt(k), v),
            );
          }
        } catch (e) {}
      }

      // ══════════════════════ INIT ══════════════════════
      (function init() {
